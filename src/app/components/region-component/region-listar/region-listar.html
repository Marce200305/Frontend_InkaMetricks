<div class="container">
  <div style="text-align: center; margin: 5%"><h2>Lista de Regiones</h2></div>

  <div style="text-align: center; margin-bottom: 20px;">
    <mat-form-field appearance="outline" style="margin-right: 10px;">
      <mat-label>Filtrar por Nombre</mat-label>
      <input matInput type="text" [(ngModel)]="nombreBuscar" placeholder="Ej: Lima">
    </mat-form-field>
    <button mat-raised-button color="primary" style="margin-right: 10px;" (click)="buscarPorNombre()">Buscar</button>
    <button mat-raised-button color="accent" (click)="nombreBuscar = ''; cargar()">Limpiar</button>
  </div>
  <div>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <ng-container matColumnDef="c1">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let element">{{ element.id }}</td>
      </ng-container>
      <ng-container matColumnDef="c2">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let element">{{ element.name }}</td>
      </ng-container>
      <ng-container matColumnDef="c3">
        <th mat-header-cell *matHeaderCellDef>Actualizar</th>
        <td mat-cell *matCellDef="let element">
          <button matButton [routerLink]="['/regions/edit', element.id]"><mat-icon>edit</mat-icon></button>
        </td>
      </ng-container>
      <ng-container matColumnDef="c4">
        <th mat-header-cell *matHeaderCellDef>Eliminar</th>
        <td mat-cell *matCellDef="let element">
          <button matButton (click)="eliminar(element.id)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
  </div>
</div>
