<div class="container">
  <div style="text-align: center; margin: 2%"><h2>Actualizar Plataforma</h2></div>
  <div style="text-align: center; margin: 3%">
    <form [formGroup]="form" (submit)="aceptar()" class="example-form">
      <mat-form-field>
        <mat-label>ID</mat-label>
        <input matInput formControlName="codigo" readonly />
      </mat-form-field><br/>
      <mat-form-field>
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="nombre" />
        <mat-error>@if (form.get('nombre')?.hasError('required')) { Ingrese el nombre }</mat-error>
      </mat-form-field><br/>
      <mat-form-field>
        <mat-label>URL Base</mat-label>
        <input matInput formControlName="urlBase" />
        <mat-error>@if (form.get('urlBase')?.hasError('required')) { Ingrese la URL base }</mat-error>
      </mat-form-field><br/>
      <div><button matButton="elevated">Actualizar</button></div>
    </form>
  </div>
</div>
